version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: anf-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: anf
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    container_name: anf-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
